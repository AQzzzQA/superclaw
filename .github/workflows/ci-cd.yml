name: SuperClaw CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  RUST_VERSION: stable
  CARGO_TERM_COLOR: always

jobs:
  # ==========================================
  # 测试作业
  # ==========================================
  test:
    name: 测试 SuperClaw
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: 安装依赖
        run: cargo install cargo-tarpaulin

      - name: 运行单元测试
        run: cargo test --verbose

      - name: 代码格式检查
        run: cargo fmt -- --check

      - name: Clippy 检查
        run: cargo clippy -- -D warnings

      - name: 安全审计
        run: cargo audit

      - name: 生成覆盖率报告
        run: cargo tarpaulin --out Xml --output-dir ./coverage

      - name: 上传覆盖率报告
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/*.xml

  # ==========================================
  # 构建作业
  # ==========================================
  build:
    name: 构建 SuperClaw
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: 构建发布版本
        run: cargo build --release

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: superclaw-release
          path: target/release/superclaw

  # ==========================================
  # 构建前端
  # ==========================================
  build-frontend:
    name: 构建前端
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖
        run: cd frontend && npm ci

      - name: 构建前端
        run: cd frontend && npm run build

      - name: 上传前端构建产物
        uses: actions/upload-artifact@v4
        with:
          name: superclaw-frontend
          path: frontend/dist

  # ==========================================
  # Docker 镜像构建
  # ==========================================
  docker:
    name: 构建 Docker 镜像
    runs-on: ubuntu-latest
    needs: [build, build-frontend]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 构建 SuperClaw 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: aqzzzaq/superclaw:latest, aqzzzaq/superclaw:${{ github.ref_name }}

      - name: 构建 LemClaw Gateway 镜像
        uses: docker/build-push-action@v5
        with:
          context: ./LemClaw
          file: ./Dockerfile.lemclaw
          push: true
          tags: aqzzzaq/lemclaw-gateway:latest, aqzzzaq/lemclaw-gateway:${{ github.ref_name }}

  # ==========================================
  # 发布 GitHub Release
  # ==========================================
  release:
    name: 创建 GitHub Release
    runs-on: ubuntu-latest
    needs: [docker]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          name: SuperClaw ${{ github.ref }}
          body: |
            ## SuperClaw v${{ github.ref }}

            ### 新功能
            - ✅ 双网关架构（WebSocket + HTTP）
            - ✅ Echo Skills（代码扫描、自动修复、智能生成）
            - ✅ Vue 3 前端界面
            - ✅ 浏览器自动化 + 监控面板
            - ✅ 完整文档（架构、API、开发者指南、安全）
            - ✅ 智能体编排（并行/串行/任务分解）

            ### 技术栈
            - 后端：Rust + Rocket
            - 前端：Vue 3 + Naive UI
            - 网关：WebSocket + HTTP
            - 数据库：SQLite + Redis
            - 浏览器：agent-browser

            ### 部署
            - Docker 容器化
            - Docker Compose 编排
            - GitHub Actions CI/CD

            ## 快速开始
            ```bash
            # 开发环境
            docker-compose up

            # 生产环境
            docker-compose -f docker-compose.prod.yml up -d
            ```

            ## 文档
            - 架构文档：https://github.com/AQzzzQA/superclaw/blob/main/docs/ARCHITECTURE.md
            - API 文档：https://github.com/AQzzzQA/superclaw/blob/main/docs/API.md
            - 开发者指南：https://github.com/AQzzzQA/superclaw/blob/main/docs/DEVELOPER.md
            - 安全文档：https://github.com/AQzzzQA/superclaw/blob/main/docs/SECURITY.md
          files: |
            target/release/superclaw
            target/release/superclaw.exe
          draft: false
          prerelease: false

  # ==========================================
  # 部署到生产环境
  # ==========================================
  deploy:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: [release]
    if: github.ref == 'refs/heads/main'
    environment:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
    steps:
      - name: 部署到生产服务器
        run: |
          echo "部署 SuperClaw 到生产环境..."
          ssh -i $DEPLOY_KEY ${{ secrets.DEPLOY_USER }}@${DEPLOY_HOST} << 'ENDSSH'
            cd /app/superclaw
            docker-compose pull
            docker-compose up -d
            docker system prune -f
          ENDSSH

      - name: 发送部署通知
        run: echo "部署完成！"
