# Skill Management System - Workspace Configuration

# Workspace templates
templates:
  development:
    name: "Development Workspace"
    description: "For software development teams"
    default_limit_set: "default"
    features:
      - "code-analysis"
      - "version-control"
      - "testing-automation"
      - "deployment-tools"
    required_skills:
      - "code-analyzer"
      - "version-control"
      - "test-automation"
    admin_permissions:
      - "manage_workspace_users"
      - "install_workspace_skills"
      - "view_workspace_logs"
    user_permissions:
      - "install_skills"
      - "view_workspace"
  
  production:
    name: "Production Workspace"
    description: "For production environment management"
    default_limit_set: "premium"
    features:
      - "monitoring"
      - "backup"
      - "security"
      - "performance"
    required_skills:
      - "system-monitor"
      - "backup-manager"
    admin_permissions:
      - "manage_workspace_users"
      - "install_workspace_skills"
      - "view_workspace_logs"
      - "manage_workspace_config"
    user_permissions:
      - "install_skills"
      - "view_workspace"
  
  testing:
    name: "Testing Workspace"
    description: "For quality assurance and testing"
    default_limit_set: "default"
    features:
      - "test-automation"
      - "bug-tracking"
      - "performance-testing"
    required_skills:
      - "test-automation"
      - "bug-tracker"
    admin_permissions:
      - "manage_workspace_users"
      - "install_workspace_skills"
      - "view_workspace_logs"
    user_permissions:
      - "install_skills"
      - "view_workspace"
  
  collaboration:
    name: "Collaboration Workspace"
    description: "For team collaboration and communication"
    default_limit_set: "free"
    features:
      - "communication"
      - "file-sharing"
      - "calendar"
      - "task-management"
    required_skills:
      - "calendar-manager"
      - "file-organizer"
      - "reminder-system"
    admin_permissions:
      - "manage_workspace_users"
      - "install_workspace_skills"
      - "view_workspace_logs"
    user_permissions:
      - "install_skills"
      - "view_workspace"

# Default workspace configurations
defaults:
  # New workspace settings
  new_workspace:
    auto_create_user_directories: true
    enable_email_notifications: true
    enable_audit_logging: true
    require_approval_for_skills: false
    max_skill_versions: 3
  
  # Workspace lifecycle settings
  lifecycle:
    auto_cleanup_inactive_days: 30
    backup_frequency: "daily"
    backup_retention_days: 90
    maintenance_window_start: "02:00"
    maintenance_window_duration_hours: 2
  
  # Performance settings
  performance:
    caching_enabled: true
    cache_ttl_minutes: 30
    compression_enabled: true
    log_level: "INFO"

# Workspace types and their characteristics
types:
  team:
    max_users: 50
    max_skills: 200
    collaboration_features: true
    reporting_features: true
    integrations:
      - "slack"
      - "github"
      - "jira"
  
  department:
    max_users: 200
    max_skills: 500
    collaboration_features: true
    reporting_features: true
    advanced_features: true
    integrations:
      - "slack"
      - "github"
      - "jira"
      - "microsoft-teams"
      - "salesforce"
  
  organization:
    max_users: 1000
    max_skills: 2000
    collaboration_features: true
    reporting_features: true
    advanced_features: true
    security_features: true
    integrations:
      - "slack"
      - "github"
      - "jira"
      - "microsoft-teams"
      - "salesforce"
      - "sap"
      - "oracle"
  
  individual:
    max_users: 1
    max_skills: 30
    collaboration_features: false
    reporting_features: false
    integrations:
      - "personal-calendar"

# Workspace settings by environment
environments:
  development:
    auto_deploy: true
    testing_enabled: true
    debug_mode: true
    monitoring_level: "basic"
  
  staging:
    auto_deploy: false
    testing_enabled: true
    debug_mode: false
    monitoring_level: "detailed"
  
  production:
    auto_deploy: false
    testing_enabled: false
    debug_mode: false
    monitoring_level: "comprehensive"
    backup_enabled: true
    monitoring_alerts: true

# Workspace templates for specific use cases
use_cases:
  # Software development team
  dev_team:
    template: "development"
    features:
      - "code-review"
      - "continuous-integration"
      - "issue-tracking"
      - "documentation"
    recommended_skills:
      - "code-analyzer"
      - "test-automation"
      - "version-control"
      - "deployment-helper"
  
  # Data science team
  data_science:
    template: "development"
    features:
      - "data-analysis"
      - "machine-learning"
      - "visualization"
      - "experiment-tracking"
    recommended_skills:
      - "data-analyzer"
      - "ml-experiment-tracker"
      - "visualization-tool"
  
  # Marketing team
  marketing:
    template: "collaboration"
    features:
      - "campaign-management"
      - "content-creation"
      - "social-media"
      - "analytics"
    recommended_skills:
      - "campaign-manager"
      - "content-generator"
      - "social-media-automation"
  
  # Customer support team
  support:
    template: "collaboration"
    features:
      - "ticket-management"
      - "knowledge-base"
      - "chat-support"
      - "analytics"
    recommended_skills:
      - "ticket-manager"
      - "knowledge-base"
      - "chatbot-assistant"

# Workspace compliance settings
compliance:
  # Security requirements
  security:
    password_policy:
      min_length: 12
      require_special_chars: true
      require_numbers: true
      require_uppercase: true
      expire_days: 90
    
    access_control:
      session_timeout: 86400  # 24 hours
      max_login_attempts: 5
      lockout_duration: 1800  # 30 minutes
      two_factor_auth: true
    
    data_protection:
      encryption_at_rest: true
      encryption_in_transit: true
      backup_encryption: true
  
  # Audit requirements
  audit:
    log_all_actions: true
    log_retention_days: 90
    audit_trail_required: true
    periodic_reviews: true
  
  # Industry-specific compliance
  industry:
    healthcare:
      hipaa_compliant: true
      data_classification: "restricted"
      access_controls: "strict"
    
    finance:
      pci_compliant: true
      sox_compliant: true
      audit_frequency: "daily"
    
    government:
      federal_compliant: true
      data_classification: "classified"
      background_checks_required: true