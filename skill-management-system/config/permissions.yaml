# Skill Management System - Permissions Configuration

# Global permission levels
global_permissions:
  admin:
    description: "System administrator with full access"
    permissions:
      - "create_workspace"
      - "delete_workspace"
      - "manage_users"
      - "manage_all_skills"
      - "view_all_logs"
      - "manage_system_config"
      - "bypass_limits"
  
  workspace_admin:
    description: "Workspace administrator with full access to workspace"
    permissions:
      - "view_workspace"
      - "manage_workspace_users"
      - "install_workspace_skills"
      - "uninstall_workspace_skills"
      - "view_workspace_logs"
      - "manage_workspace_config"
      - "bypass_workspace_limits"
  
  user:
    description: "Regular user with basic permissions"
    permissions:
      - "view_workspace"
      - "install_skills"
      - "uninstall_skills"
      - "view_own_logs"
      - "view_available_skills"

  viewer:
    description: "Read-only access"
    permissions:
      - "view_workspace"
      - "view_available_skills"
      - "view_public_logs"

# Skill-specific permissions
skill_permissions:
  # Core system skills (high trust required)
  system:
    required_level: "admin"
    max_users: 5
    description: "System management skills"
    skills:
      - "system-monitor"
      - "security-audit"
      - "backup-manager"
      - "config-manager"
  
  # Business skills (medium trust required)
  business:
    required_level: "workspace_admin"
    max_users: 20
    description: "Business process automation skills"
    skills:
      - "sales-automation"
      - "inventory-manager"
      - "report-generator"
      - "workflow-automation"
  
  # Development skills (standard trust required)
  development:
    required_level: "user"
    max_users: 50
    description: "Software development skills"
    skills:
      - "code-analyzer"
      - "test-automation"
      - "version-control"
      - "deployment-helper"
  
  # General skills (low trust required)
  general:
    required_level: "viewer"
    max_users: 100
    description: "General productivity skills"
    skills:
      - "calendar-manager"
      - "file-organizer"
      - "note-taker"
      - "reminder-system"

# Permission inheritance rules
inheritance:
  workspace_admin:
    inherits: ["user"]
    additional_permissions:
      - "manage_workspace_users"
      - "manage_workspace_config"
  
  admin:
    inherits: ["workspace_admin"]
    additional_permissions:
      - "create_workspace"
      - "delete_workspace"
      - "manage_system_config"
      - "bypass_limits"

# Permission validation rules
validation:
  # Skills that require explicit approval
  approval_required:
    - "system-monitor"
    - "security-audit"
    - "data-export"
  
  # Skills with special handling
  special_handling:
    backup-manager:
      backup_required: true
      retention_days: 90
    data-export:
      audit_required: true
      export_limit: "10GB/day"

# Security rules
security:
  # Minimum permission level for skill installation
  min_install_level: "user"
  
  # Skills that require additional verification
  verification_required:
    - "payment-processor"
    - "identity-verification"
    - "data-migration"
  
  # Skills that are restricted to specific environments
  environment_restricted:
    production:
      restricted: ["development-testing", "security-testing"]
    staging:
      restricted: ["system-monitor", "backup-manager"]