# Skill Management System - Role Configuration

# Role definitions with hierarchical permissions
roles:
  # System-level roles
  system_admin:
    name: "System Administrator"
    level: "system"
    description: "Full system administration privileges"
    permissions:
      # System management
      - "system_config"
      - "system_monitoring"
      - "system_backup"
      - "system_restore"
      - "system_upgrade"
      - "user_management"
      - "workspace_management"
      - "skill_management"
      - "audit_management"
      
      # Workspace management
      - "create_workspace"
      - "delete_workspace"
      - "manage_all_workspaces"
      - "view_all_workspaces"
      
      # User management
      - "create_user"
      - "delete_user"
      - "manage_all_users"
      - "view_all_users"
      - "assign_roles"
      
      # Skill management
      - "install_skill_system"
      - "uninstall_skill_system"
      - "manage_skill_registry"
      - "approve_skill_installations"
      - "override_skill_limits"
      
      # Audit and monitoring
      - "view_all_audit_logs"
      - "export_audit_data"
      - "generate_reports"
      - "manage_alerts"
      
      # Security
      - "manage_security_policies"
      - "manage_access_controls"
      - "manage_api_keys"
      - "manage_system_tokens"
    
    constraints:
      max_users: 5
      requires_approval: true
      audit_all_actions: true

  # Workspace-level roles
  workspace_admin:
    name: "Workspace Administrator"
    level: "workspace"
    description: "Full administration within assigned workspaces"
    permissions:
      # Workspace management
      - "view_workspace"
      - "manage_workspace_config"
      - "manage_workspace_users"
      - "manage_workspace_skills"
      - "view_workspace_logs"
      - "manage_workspace_integrations"
      
      # User management (within workspace)
      - "add_user_to_workspace"
      - "remove_user_from_workspace"
      - "manage_user_permissions"
      - "assign_workspace_roles"
      
      # Skill management (within workspace)
      - "install_workspace_skills"
      - "uninstall_workspace_skills"
      - "approve_skill_installations"
      - "manage_skill_permissions"
      
      # Monitoring and reporting
      - "view_workspace_metrics"
      - "generate_workspace_reports"
      - "manage_workspace_alerts"
      
      # Security
      - "manage_workspace_security"
      - "manage_workspace_access"
      - "manage_workspace_tokens"
    
    constraints:
      max_workspaces: 10
      max_users_per_workspace: 50
      audit_all_actions: true

  # Technical roles
  developer:
    name: "Developer"
    level: "technical"
    description: "Technical users with development permissions"
    permissions:
      # Development skills
      - "install_development_skills"
      - "use_development_tools"
      - "access_code_repositories"
      - "manage_development_environment"
      
      # Workspace access
      - "view_workspace"
      - "install_skills"
      - "view_workspace_logs"
      - "use_workspace_resources"
      
      # Code and testing
      - "create_code"
      - "test_code"
      - "deploy_code"
      - "review_code"
      
      # Collaboration
      - "collaborate_on_skills"
      - "share_resources"
      - "communicate_with_team"
    
    constraints:
      max_skills: 30
      max_workspaces: 5
      skill_categories: ["development", "general"]

  analyst:
    name: "Data Analyst"
    level: "technical"
    description: "Data analysis and reporting permissions"
    permissions:
      # Data analysis skills
      - "install_analysis_skills"
      - "use_analysis_tools"
      - "access_data_sources"
      - "generate_reports"
      
      # Workspace access
      - "view_workspace"
      - "install_skills"
      - "view_workspace_logs"
      - "use_workspace_resources"
      
      # Data manipulation
      - "query_data"
      - "process_data"
      - "visualize_data"
      - "export_data"
      
      # Collaboration
      - "share_reports"
      - "collaborate_on_analysis"
      - "communicate_findings"
    
    constraints:
      max_skills: 25
      max_workspaces: 5
      skill_categories: ["development", "general", "business"]

  # Business roles
  business_user:
    name: "Business User"
    level: "business"
    description: "Standard business user permissions"
    permissions:
      # Business skills
      - "install_business_skills"
      - "use_business_tools"
      - "access_business_data"
      - "generate_business_reports"
      
      # Workspace access
      - "view_workspace"
      - "install_skills"
      - "view_workspace_logs"
      - "use_workspace_resources"
      
      # Collaboration
      - "collaborate_on_tasks"
      - "share_documents"
      - "communicate_with_colleagues"
      
      # Productivity
      - "manage_calendar"
      - "organize_files"
      - "set_reminders"
    
    constraints:
      max_skills: 20
      max_workspaces: 3
      skill_categories: ["business", "general"]

  manager:
    name: "Manager"
    level: "business"
    description: "Management team with team oversight permissions"
    permissions:
      # Management skills
      - "install_management_skills"
      - "use_management_tools"
      - "access_team_data"
      - "generate_team_reports"
      
      # Team management
      - "view_team_workspace"
      - "manage_team_resources"
      - "assign_team_tasks"
      - "review_team_performance"
      
      # Workspace access
      - "view_workspace"
      - "install_skills"
      - "view_workspace_logs"
      - "manage_workspace_config"
      
      # Reporting
      - "generate_reports"
      - "export_team_data"
      - "create_dashboards"
    
    constraints:
      max_skills: 25
      max_workspaces: 5
      max_team_size: 20
      skill_categories: ["business", "general", "development"]

  # Standard user roles
  user:
    name: "Standard User"
    level: "standard"
    description: "Basic user permissions for skill usage"
    permissions:
      # Basic skills
      - "install_skills"
      - "use_skills"
      - "view_available_skills"
      - "view_skill_documentation"
      
      # Workspace access
      - "view_workspace"
      - "view_workspace_skills"
      - "use_workspace_resources"
      
      # Personal usage
      - "manage_personal_skills"
      - "view_personal_logs"
      - "export_personal_data"
      
      # Support
      - "request_support"
      - "access_help_resources"
    
    constraints:
      max_skills: 15
      max_workspaces: 3
      skill_categories: ["general"]

  # Limited access roles
  viewer:
    name: "Viewer"
    level: "limited"
    description: "Read-only access to skills and workspaces"
    permissions:
      # View permissions only
      - "view_workspace"
      - "view_available_skills"
      - "view_skill_documentation"
      - "view_public_reports"
      
      # Limited access
      - "access_demo_skills"
      - "view_skill_previews"
      - "access_help_resources"
    
    constraints:
      max_skills: 5
      max_workspaces: 1
      read_only_access: true

  guest:
    name: "Guest"
    level: "external"
    description: "Temporary external user with limited access"
    permissions:
      # Basic guest permissions
      - "view_workspace"
      - "view_available_skills"
      - "use_demo_skills"
      - "access_help_resources"
      
      # Temporary access
      - "temporary_skill_access"
      - "limited_workspace_access"
    
    constraints:
      max_skills: 3
      max_duration_hours: 24
      temporary_access: true

# Role inheritance hierarchy
inheritance:
  system_admin:
    inherits: ["workspace_admin"]
    additional_permissions:
      - "system_config"
      - "user_management"
      - "workspace_management"
  
  workspace_admin:
    inherits: ["user"]
    additional_permissions:
      - "manage_workspace_users"
      - "manage_workspace_skills"
      - "approve_skill_installations"
  
  manager:
    inherits: ["business_user"]
    additional_permissions:
      - "manage_team_resources"
      - "assign_team_tasks"
      - "generate_team_reports"
  
  developer:
    inherits: ["user"]
    additional_permissions:
      - "install_development_skills"
      - "access_code_repositories"
      - "manage_development_environment"
  
  analyst:
    inherits: ["user"]
    additional_permissions:
      - "install_analysis_skills"
      - "access_data_sources"
      - "generate_reports"

# Role assignment rules
assignment_rules:
  # Automatic assignment based on user attributes
  automatic:
    criteria:
      domain:
        company_domain:
          permissions: ["business_user"]
          constraints: {}
        
        tech_domain:
          permissions: ["developer"]
          constraints: {}
    
    # Role escalation rules
    escalation:
      days_for_promotion: 30
      performance_threshold: 80
      skill_completion_threshold: 20
  
  # Manual assignment by administrators
  manual:
    approval_required: true
    approval_chain: ["workspace_admin", "system_admin"]
    assignment_limits:
      max_roles_per_user: 3
      role_duration_days: 365

# Role customization
customization:
  # Allow custom roles creation
  allow_custom_roles: true
  
  # Custom role template
  custom_role_template:
    level: "custom"
    permissions: []
    constraints: {}
    requires_approval: true
  
  # Role modification rules
  modification:
    allowed_changes: ["permissions", "constraints"]
    requires_approval: true
    audit_required: true

# Role auditing
auditing:
  # Track role assignments
  track_assignments: true
  track_modifications: true
  track_usage: true
  
  # Audit retention
  retention_days: 90
  
  # Alert configuration
  alerts:
    role_changes: true
    permission_changes: true
    assignment_changes: true