# Logstash配置文件

input {
  # Docker日志收集
  file {
    path => "/app/backend-logs/*.log"
    type => "backend"
    start_position => "beginning"
    codec => multiline {
      pattern => "^%{TIMESTAMP_ISO8601}"
      negate => true
      what => "previous"
    }
  }

  file {
    path => "/app/frontend-logs/*.log"
    type => "frontend"
    start_position => "beginning"
  }

  # Nginx访问日志
  file {
    path => "/var/log/nginx/access.log"
    type => "nginx-access"
    start_position => "beginning"
  }

  # Nginx错误日志
  file {
    path => "/var/log/nginx/error.log"
    type => "nginx-error"
    start_position => "beginning"
  }

  # Syslog输入（可选）
  syslog {
    port => 5140
    type => "syslog"
  }
}

filter {
  # 解析JSON日志
  if [type] == "backend" or [type] == "frontend" {
    json {
      source => "message"
    }

    # 提取日志级别
    if [level] {
      mutate {
        uppercase => [ "level" ]
      }
    }
  }

  # 解析Nginx访问日志
  if [type] == "nginx-access" {
    grok {
      match => {
        "message" => '%{IPORHOST:remote_addr} - %{DATA:remote_user} \[%{HTTPDATE:time_local}\] "%{WORD:method} %{DATA:request} HTTP/%{NUMBER:http_version}" %{NUMBER:status} %{NUMBER:body_bytes_sent} "%{DATA:http_referer}" "%{DATA:http_user_agent}" rt=%{NUMBER:request_time} uct="%{DATA:upstream_connect_time}" uht="%{DATA:upstream_header_time}" urt="%{DATA:upstream_response_time}"'
      }
    }

    date {
      match => [ "time_local", "dd/MMM/yyyy:HH:mm:ss Z" ]
    }

    mutate {
      convert => {
        "status" => "integer"
        "body_bytes_sent" => "integer"
        "request_time" => "float"
      }
    }

    # 提取响应时间
    if [request_time] {
      ruby {
        code => "event.set('request_time_ms', event.get('request_time') * 1000)"
      }
    }
  }

  # 解析Nginx错误日志
  if [type] == "nginx-error" {
    grok {
      match => {
        "message" => '%{TIMESTAMP_ISO8601:timestamp} \[%{LOGLEVEL:level}\] %{NUMBER:pid}#%{NUMBER:tid}: %{GREEDYDATA:errormessage} (?:client: %{IP:client})?(?:, server: %{DATA:server})?(?:, request: "%{WORD:method} %{DATA:request} HTTP/%{NUMBER:http_version}")?'
      }
    }

    date {
      match => [ "timestamp", "yyyy-MM-dd HH:mm:ss" ]
    }

    mutate {
      uppercase => [ "level" ]
    }
  }

  # 添加环境标签
  mutate {
    add_field => {
      "environment" => "${ENVIRONMENT}"
      "cluster" => "dsp-platform"
    }
  }

  # 提取地理位置（可选，需要GeoIP数据库）
  # geoip {
  #   source => "remote_addr"
  #   target => "geoip"
  # }

  # 删除不需要的字段
  mutate {
    remove_field => [ "host", "port", "@version" ]
  }
}

output {
  # 输出到Elasticsearch
  elasticsearch {
    hosts => ["http://dsp-elasticsearch:9200"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    index => "dsp-logs-%{[type]}-%{+YYYY.MM.dd}"
    template_name => "dsp-logs"
    template_overwrite => true
  }

  # 输出到标准输出（调试用）
  # stdout {
  #   codec => rubydebug
  # }
}
