# Grafana Prometheus数据源配置

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://dsp-prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s
    version: 1

  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://dsp-elasticsearch:9200
    database: "dsp-logs-*"
    jsonData:
      esVersion: "8.10.2"
      logMessageField: "message"
      maxConcurrentShardRequests: 5
      timeField: "@timestamp"
    editable: true
    version: 1

  - name: Loki (Optional)
    type: loki
    access: proxy
    url: http://dsp-loki:3100
    jsonData:
      maxLines: 1000
    editable: true
    version: 1
