# Nginx蓝绿部署配置
# upstream定义后端服务器，通过环境变量切换流量

upstream dsp_backend_pool {
    # 蓝色环境（当前版本）
    # server dsp-backend-blue:8000;
    
    # 绿色环境（新版本）
    server dsp-backend-green:8000;
    
    # 或使用权重分配（灰度发布）
    # server dsp-backend-blue:8000 weight=80;
    # server dsp-backend-green:8000 weight=20;
    
    keepalive 32;
}

upstream dsp_frontend_pool {
    # 蓝色环境（当前版本）
    # server dsp-frontend-blue:3000;
    
    # 绿色环境（新版本）
    server dsp-frontend-green:3000;
    
    # 或使用权重分配（灰度发布）
    # server dsp-frontend-blue:3000 weight=80;
    # server dsp-frontend-green:3000 weight=20;
    
    keepalive 32;
}

# HTTP服务器 - 重定向到HTTPS
server {
    listen 80;
    listen [:::80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS服务器 - 主应用
server {
    listen 443 ssl http2;
    listen [:::443 ssl http2;
    server_name ${DOMAIN_NAME};

    # SSL证书配置
    ssl_certificate /etc/letsencrypt/live/${DOMAIN_NAME}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN_NAME}/privkey.pem;

    # SSL安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # 安全头部
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # API代理
    location /api {
        proxy_pass http://dsp_backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 前端静态文件
    location / {
        proxy_pass http://dsp_frontend_pool;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # 流量切换端点（仅内网）
    location /switch-traffic {
        allow 127.0.0.1;
        allow 172.0.0.0/8;
        deny all;
        
        # 返回当前流量分配信息
        default_type application/json;
        return 200 '{"backend":"green","frontend":"green","timestamp":"${time_iso8601}"}';
    }
}
