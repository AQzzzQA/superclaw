version: '3.8'

services:
  # ==================== 核心应用服务 ====================
  dsp-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: dsp-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=mysql://dsp_user:${MYSQL_PASSWORD}@dsp-mysql:3306/dsp_db
      - REDIS_URL=redis://dsp-redis:6379/0
      - CELERY_BROKER_URL=redis://dsp-redis:6379/0
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - JWT_SECRET=${JWT_SECRET}
      - SENTRY_DSN=${SENTRY_DSN}
    volumes:
      - ../backend:/app
      - backend-logs:/app/logs
    depends_on:
      - dsp-mysql
      - dsp-redis
    networks:
      - dsp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dsp-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: dsp-frontend
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=https://${DOMAIN_NAME}/api
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - ../frontend:/app
      - frontend-logs:/app/logs
    depends_on:
      - dsp-backend
    networks:
      - dsp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  dsp-celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: dsp-celery-worker
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=mysql://dsp_user:${MYSQL_PASSWORD}@dsp-mysql:3306/dsp_db
      - REDIS_URL=redis://dsp-redis:6379/0
      - CELERY_BROKER_URL=redis://dsp-redis:6379/0
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - ../backend:/app
      - backend-logs:/app/logs
    depends_on:
      - dsp-mysql
      - dsp-redis
    networks:
      - dsp-network

  dsp-celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: dsp-celery-beat
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=mysql://dsp_user:${MYSQL_PASSWORD}@dsp-mysql:3306/dsp_db
      - REDIS_URL=redis://dsp-redis:6379/0
      - CELERY_BROKER_URL=redis://dsp-redis:6379/0
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - ../backend:/app
      - backend-logs:/app/logs
    depends_on:
      - dsp-mysql
      - dsp-redis
    networks:
      - dsp-network

  # ==================== 数据库服务 ====================
  dsp-mysql:
    image: mysql:8.0
    container_name: dsp-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=dsp_db
      - MYSQL_USER=dsp_user
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - dsp-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 3

  dsp-redis:
    image: redis:7-alpine
    container_name: dsp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - dsp-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== 反向代理 ====================
  dsp-nginx:
    image: nginx:1.24-alpine
    container_name: dsp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - dsp-backend
      - dsp-frontend
    networks:
      - dsp-network

  # ==================== SSL证书自动续期 ====================
  certbot:
    image: certbot/certbot:latest
    container_name: dsp-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - dsp-network

  # ==================== 监控服务 ====================
  dsp-prometheus:
    image: prom/prometheus:v2.45.0
    container_name: dsp-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    networks:
      - dsp-network
    depends_on:
      - dsp-backend

  dsp-grafana:
    image: grafana/grafana:10.1.0
    container_name: dsp-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=redis-datasource,grafana-piechart-panel
      - GF_SERVER_ROOT_URL=https://${DOMAIN_NAME}/grafana
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - dsp-network
    depends_on:
      - dsp-prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dsp-alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: dsp-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=https://${DOMAIN_NAME}/alertmanager'
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    networks:
      - dsp-network
    depends_on:
      - dsp-prometheus

  dsp-node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: dsp-node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - dsp-network
    ports:
      - "9100:9100"

  dsp-cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: dsp-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - dsp-network
    ports:
      - "8080:8080"

  # ==================== 日志服务 ====================
  dsp-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: dsp-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - cluster.name=dsp-cluster
      - node.name=dsp-node
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - dsp-network
    healthcheck:
      test: ["CMD-SHELL", "curl -u elastic:${ELASTIC_PASSWORD} -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 30s
      timeout: 10s
      retries: 3

  dsp-logstash:
    image: docker.elastic.co/logstash/logstash:8.10.2
    container_name: dsp-logstash
    restart: unless-stopped
    environment:
      - "LS_JAVA_OPTS=-Xms512m -Xmx512m"
      - ELASTICSEARCH_HOSTS=http://dsp-elasticsearch:9200
      - ELASTICSEARCH_USER=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
    volumes:
      - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - logstash-data:/usr/share/logstash/data
      - backend-logs:/app/backend-logs:ro
      - frontend-logs:/app/frontend-logs:ro
    networks:
      - dsp-network
    depends_on:
      - dsp-elasticsearch

  dsp-kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    container_name: dsp-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://dsp-elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
      - SERVER_NAME=${DOMAIN_NAME}
      - SERVER_HOST=0.0.0.0
    volumes:
      - ./kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
      - kibana-data:/usr/share/kibana/data
    networks:
      - dsp-network
    depends_on:
      - dsp-elasticsearch
    ports:
      - "5601:5601"

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local
  elasticsearch-data:
    driver: local
  logstash-data:
    driver: local
  kibana-data:
    driver: local
  backend-logs:
    driver: local
  frontend-logs:
    driver: local

networks:
  dsp-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
