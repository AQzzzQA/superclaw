[pytest]
# pytest 配置文件
# DSP国内全媒体广告平台测试配置

# 测试路径
testpaths = tests

# 测试文件匹配模式
python_files = test_*.py *_test.py
python_classes = Test* *Tests
python_functions = test_*

# 命令行选项
addopts =
    # 详细输出
    -v
    # 严格标记
    --strict-markers
    # 覆盖率配置
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    # 显示本地变量（失败时）
    --showlocals
    # 最短断言
    --assert=plain
    # 警告设置
    -W ignore::DeprecationWarning
    -W ignore::PendingDeprecationWarning

# 测试标记
markers =
    # 测试类型标记
    unit: 单元测试
    integration: 集成测试
    e2e: 端到端测试

    # 测试速度标记
    slow: 慢速测试（执行时间>1s）
    fast: 快速测试（执行时间<1s）

    # 功能模块标记
    auth: 认证和授权相关测试
    account: 媒体账户管理测试
    campaign: 广告投放管理测试
    creative: 广告创意管理测试
    report: 数据报表测试
    budget: 预算风控测试
    rbac: 权限系统测试
    notification: 消息通知测试

    # 测试场景标记
    happy_path: 正常场景测试
    error_case: 异常场景测试
    edge_case: 边界场景测试
    performance: 性能测试

    # 外部依赖标记
    requires_db: 需要数据库
    requires_redis: 需要Redis
    requires_external_api: 需要外部API

# 异步测试模式
asyncio_mode = auto

# 测试超时设置（需要安装 pytest-timeout）
timeout = 300

# 覆盖率配置
[coverage:run]
source = app
omit =
    */tests/*
    */migrations/*
    */__pycache__/*
    */venv/*
    */env/*
    */virtualenv/*
    */.venv/*

[coverage:report]
# 覆盖率目标
precision = 2
show_missing = True
skip_covered = False

# 排除的行
exclude_lines =
    # 不测试的代码
    pragma: no cover
    def __repr__
    def __str__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstract

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml

# 日志配置
[log_cli]
level = INFO
format = %(asctime)s [%(levelname)8s] %(message)s
date_format = %Y-%m-%d %H:%M:%S

[log_cli_header_format]
%(asctime)s [%(levelname)8s] %(message)s

[log_cli_date_format]
%Y-%m-%d %H:%M:%S
