version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: dsp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD:-root}
      MYSQL_DATABASE: ${DATABASE_NAME:-dsp_platform}
    ports:
      - "0.0.0.0:3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infrastructure/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./infrastructure/mysql/conf.d:/etc/mysql/conf.d
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - dsp-network

  # Redis Cache & Message Broker
  redis:
    image: redis:7.0-alpine
    container_name: dsp-redis
    restart: unless-stopped
    ports:
      - "0.0.0.0:6381:6379"
    volumes:
      - redis_data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 5
    networks:
      - dsp-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dsp-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/v1/system/health\", timeout=5).read()'"]
      timeout: 10s
      retries: 5
    networks:
      - dsp-network

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dsp-celery-worker
    restart: unless-stopped
    command: celery -A app.tasks.worker worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      - DATABASE_HOST=mysql
      - REDIS_HOST=redis
      - REDIS_PASSWORD=RedisSecurePassword2026
      - ENVIRONMENT=production
      - CELERY_BROKER_URL=redis://:RedisSecurePassword2026@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:RedisSecurePassword2026@redis:6379/2
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - dsp-network

  # Celery Beat Scheduler
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dsp-celery-beat
    restart: unless-stopped
    command: celery -A app.tasks.worker beat --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_HOST=mysql
      - REDIS_HOST=redis
      - ENVIRONMENT=production
    volumes:
      - ./backend:/app
      - logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - dsp-network

  # Flower - Celery Monitoring
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dsp-flower
    restart: unless-stopped
    command: celery -A app.tasks.worker flower --port=5555
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - CELERY_BROKER_URL=redis://:RedisSecurePassword2026@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:RedisSecurePassword2026@redis:6379/2
    ports:
      - "0.0.0.0:5555:5555"
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    networks:
      - dsp-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: dsp-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl
      - uploads:/var/www/uploads
    depends_on:
      - backend
    networks:
      - dsp-network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: dsp-prometheus
    restart: unless-stopped
    ports:
      - "0.0.0.0:9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - dsp-network

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: dsp-grafana
    restart: unless-stopped
    ports:
      - "0.0.0.0:8888:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - dsp-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
  logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  dsp-network:
    driver: bridge
