# Redis Configuration for DSP Platform
# Password: RedisSecurePassword2026

# Bind to all interfaces (Docker network)
bind 0.0.0.0

# Port
port 6379

# Set password
requirepass RedisSecurePassword2026

# Max clients
maxclients 10000

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (optional - for production)
# save 900 1
# save 300 10
# save 60 10000

# Logging
loglevel notice
logfile ""

# Databases
databases 16

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128
