<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LemClaw Gateway - 监控面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        header h1 {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        header p {
            color: #666;
            font-size: 1.1em;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-card h3 {
            font-size: 1.2em;
            margin-bottom: 15px;
            color: #666;
        }
        
        .stat-value {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 10px;
            color: #764ba2;
        }
        
        .stat-label {
            color: #999;
            font-size: 0.9em;
        }
        
        .success { color: #52c41a; }
        .warning { color: #faad14; }
        .error { color: #ff4d4f; }
        .info { color: #1890ff; }
        
        .logs-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        .logs-section h2 {
            font-size: 2em;
            margin-bottom: 20px;
            color: #333;
        }
        
        .logs-container {
            max-height: 500px;
            overflow-y: auto;
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .log-item {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .log-item:last-child {
            border-bottom: none;
        }
        
        .log-time {
            font-size: 0.85em;
            color: #999;
            min-width: 150px;
        }
        
        .log-endpoint {
            font-weight: 600;
            color: #333;
            min-width: 150px;
        }
        
        .log-time-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            color: white;
        }
        
        .log-time-badge.fast { background: #52c41a; }
        .log-time-badge.normal { background: #1890ff; }
        .log-time-badge.slow { background: #faad14; }
        .log-time-badge.very-slow { background: #ff4d4f; }
        
        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }
        
        .refresh-btn:hover {
            transform: scale(1.05);
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            header h1 {
                font-size: 2em;
            }
            
            .stat-value {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🦞 LemClaw Gateway</h1>
            <p>实时监控面板 - 浏览器自动化 + 性能优化</p>
        </header>
        
        <div class="stats-grid" id="stats-grid">
            <!-- 统计卡片将通过 JS 动态加载 -->
        </div>
        
        <div class="logs-section">
            <h2>📊 性能日志</h2>
            <div class="logs-container" id="logs-container">
                <!-- 日志将通过 JS 动态加载 -->
            </div>
        </div>
    </div>
    
    <button class="refresh-btn" onclick="refreshData()">🔄 刷新数据</button>
    
    <script>
        // 配置
        const API_BASE = 'http://localhost:8089/api';
        
        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/monitoring/metrics`);
                const data = await response.json();
                
                // 计算总请求数和错误数
                const totalRequests = Object.values(data.requests).reduce((a, b) => a + b, 0);
                const totalErrors = Object.values(data.errors).reduce((a, b) => a + b, 0);
                const errorRate = totalRequests > 0 ? ((totalErrors / totalRequests) * 100).toFixed(2) : 0;
                
                // 渲染统计卡片
                const statsGrid = document.getElementById('stats-grid');
                statsGrid.innerHTML = `
                    <div class="stat-card">
                        <h3>📈 总请求数</h3>
                        <div class="stat-value info">${totalRequests}</div>
                        <div class="stat-label">过去 24 小时</div>
                    </div>
                    <div class="stat-card">
                        <h3>❌ 错误数</h3>
                        <div class="stat-value error">${totalErrors}</div>
                        <div class="stat-label">过去 24 小时</div>
                    </div>
                    <div class="stat-card">
                        <h3>⚠️ 错误率</h3>
                        <div class="stat-value ${errorRate > 5 ? 'error' : 'warning'}">${errorRate}%</div>
                        <div class="stat-label">目标: < 5%</div>
                    </div>
                    <div class="stat-card">
                        <h3>⚡ 平均响应时间</h3>
                        <div class="stat-value ${getAvgResponseTimeColor(data.avg_response_times)}">
                            ${getAvgResponseTime(data.avg_response_times)} ms
                        </div>
                        <div class="stat-label">所有端点</div>
                    </div>
                `;
                
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }
        
        // 加载日志
        async function loadLogs() {
            try {
                const response = await fetch(`${API_BASE}/monitoring/logs`);
                const data = await response.json();
                
                // 渲染日志
                const logsContainer = document.getElementById('logs-container');
                
                if (!data.logs || data.logs.length === 0) {
                    logsContainer.innerHTML = '<div style="text-align:center;padding:30px;color:#999;">暂无日志</div>';
                    return;
                }
                
                logsContainer.innerHTML = data.logs.map(log => {
                    const timeClass = getResponseTimeClass(log.response_time_ms);
                    const timeLabel = getResponseTimeLabel(log.response_time_ms);
                    
                    return `
                        <div class="log-item">
                            <div class="log-time">
                                ${new Date(log.timestamp).toLocaleString('zh-CN')}
                            </div>
                            <div class="log-endpoint">${log.endpoint}</div>
                            <div class="log-time-badge ${timeClass}">${timeLabel}</div>
                            <div style="color:${log.status_code >= 400 ? '#ff4d4f' : '#52c41a'}">
                                ${log.status_code}
                            </div>
                            ${log.error_message ? `<div style="color:#ff4d4f;margin-left:15px;">${log.error_message}</div>` : ''}
                        </div>
                    `;
                }).join('');
                
            } catch (error) {
                console.error('Failed to load logs:', error);
            }
        }
        
        // 辅助函数
        function getAvgResponseTime(times) {
            const values = Object.values(times).flat();
            if (values.length === 0) return '0';
            const avg = values.reduce((a, b) => a + b, 0) / values.length;
            return Math.round(avg);
        }
        
        function getAvgResponseTimeColor(times) {
            const avg = getAvgResponseTime(times);
            if (avg < 100) return 'success';
            if (avg < 300) return 'info';
            if (avg < 1000) return 'warning';
            return 'error';
        }
        
        function getResponseTimeClass(ms) {
            if (ms < 100) return 'fast';
            if (ms < 300) return 'normal';
            if (ms < 1000) return 'slow';
            return 'very-slow';
        }
        
        function getResponseTimeLabel(ms) {
            if (ms < 100) return '⚡ 快';
            if (ms < 300) return '👍 正常';
            if (ms < 1000) return '⚠️ 慢';
            return '❌ 很慢';
        }
        
        // 刷新数据
        function refreshData() {
            loadStats();
            loadLogs();
        }
        
        // 初始化
        refreshData();
        
        // 每 30 秒自动刷新
        setInterval(refreshData, 30000);
    </script>
</body>
</html>
